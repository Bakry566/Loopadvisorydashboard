<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Loop Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;700&family=Fraunces:ital,wght@0,600;1,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#11141A;--s1:#161A21;--s2:#1C212B;--s3:#242A36;--bd:#323A4A;
  --violet:#7096DB;--vdim:#2B4164;--vbg:#7096DB14;
  --coral:#C1694A;--cbg:#C1694A12;
  --green:#34D399;--gnbg:#34D39910;
  --red:#F87171;--rbg:#F8717110;
  --yellow:#FBBF24;--ybg:#FBBF2410;
  --slate:#3D4B60;
  --sub:#5C6579;--txt2:#8C95A8;--txt:#E7EAF0;
}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ─── HEADER ─── */
.hdr{position:sticky;top:0;z-index:100;background:rgba(8,10,16,.9);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);padding:11px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.logo-img{height:30px;width:auto;border-radius:6px;flex-shrink:0;display:block}
.bn{font-family:'Fraunces',serif;font-size:16px;font-weight:600;letter-spacing:-.01em}
.bn em{color:var(--violet);font-style:italic;font-weight:500}
.bs{font-size:9px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.live-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;
  background:var(--gnbg);border:1px solid #34D39930;
  font-size:9.5px;font-weight:800;color:var(--green);letter-spacing:.09em}
.blink-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  animation:pulse 1.3s ease-in-out infinite}
.lpulse{width:5px;height:5px;border-radius:50%;background:var(--yellow)}
.lpulse.on{background:var(--green);animation:pulse 1.4s ease-in-out infinite}
.clk{font-size:12px;font-weight:600;color:var(--violet);font-family:'DM Mono',monospace;letter-spacing:.04em}
.sync-lbl{font-size:9px;color:var(--sub);text-align:right}

.main{padding:16px 18px;display:flex;flex-direction:column;gap:16px;animation:fadeUp .3s ease}

.slbl{font-size:9px;font-weight:700;color:var(--sub);letter-spacing:.14em;
  text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;
  border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.slbl-r{font-size:9px;color:var(--sub);font-weight:400;letter-spacing:0;text-transform:none}

.card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px 18px}

.note{border:1px dashed var(--bd);border-left:3px solid var(--yellow);
  background:var(--s2);border-radius:10px;padding:11px 14px;
  font-size:11px;color:var(--txt2);line-height:1.55}
.note b{color:var(--txt)}
.note.violet{border-left-color:var(--violet)}
.note.coral{border-left-color:var(--coral)}

/* ─── FEATURED BANNER ─── */
.banner{border-radius:14px;padding:20px 18px;position:relative;overflow:hidden;
  background:linear-gradient(155deg,#141233 0%,#0D0F17 55%,#12161F 100%);
  border:1px solid #7096DB2A}
.banner::after{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;
  border-radius:50%;background:radial-gradient(circle,#7096DB0E 0%,transparent 70%);pointer-events:none}
.b-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.b-name{font-size:17px;font-weight:800;color:var(--txt);line-height:1.3;flex:1;min-width:0}
.b-live{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;flex-shrink:0}
.b-live.on{background:var(--gnbg);border:1px solid #34D39928}
.b-live.off{background:var(--ybg);border:1px solid #FBBF2428}
.b-live .lpulse{width:6px;height:6px}
.b-live span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.b-live.on span{color:var(--green)}
.b-live.off span{color:var(--yellow)}

.b-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.bk{background:rgba(255,255,255,.035);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.bk-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;margin-bottom:4px}
.bk-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.bk-sub{font-size:10px;color:var(--txt2);margin-top:3px}

.b-foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--bd)88}
.bf-item{display:flex;align-items:center;gap:5px}
.bf-lbl{font-size:10px;color:var(--sub)}
.bf-val{font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.freq-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px}

.no-live{text-align:center;padding:32px;color:var(--sub);font-size:13px;border:1px dashed var(--bd);border-radius:14px}

.hist-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.hc{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;text-align:center}
.hc-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;margin-bottom:4px}
.hc-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.hc-sub{font-size:10px;color:var(--txt2);margin-top:3px}

.funnel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fcol{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px 18px}
.fcol-hd{font-size:12px;font-weight:700;margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.fcol-hd-n{font-size:9px;color:var(--sub);font-weight:400}
.fi{display:flex;align-items:center;gap:7px;padding:3px 0}
.fi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fi-name{font-size:11px;color:var(--txt);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-bar-w{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden;max-width:72px}
.fi-bar{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.fi-n{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;width:20px;text-align:right;flex-shrink:0}
.fi-p{font-size:9px;color:var(--sub);width:28px;text-align:right;flex-shrink:0}
.qrate{margin-top:10px;padding-top:8px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.qrate-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.qrate-val{font-size:18px;font-weight:900;font-family:'DM Mono',monospace}

.cmp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)55}
.cmp-row:last-child{border-bottom:none}
.cmp-lbl{font-size:12px;color:var(--txt2);width:100px;flex-shrink:0}
.cmp-cur{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;flex:1}
.cmp-hist{font-size:10px;color:var(--sub);flex:1}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.b-good{background:var(--gnbg);color:var(--green);border:1px solid #34D39928}
.b-warn{background:var(--ybg);color:var(--yellow);border:1px solid #FBBF2428}
.b-bad {background:var(--rbg);color:var(--red);border:1px solid #F8717128}
.b-neu {background:var(--s3);color:var(--sub);border:1px solid var(--bd)}

.pipe-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.pg{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px 10px;text-align:center}
.pg-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;margin-bottom:4px}
.pg-lbl{font-size:8.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}

.lead-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.lead-name{font-weight:700;font-size:13px}
.lead-unit{font-size:10.5px;color:var(--txt2);margin-top:2px}
.lead-status{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;letter-spacing:.03em}
.lead-meta{font-size:11px;color:var(--txt2);line-height:1.6}
.lead-meta b{color:var(--sub);font-weight:600}
.lead-feedback{font-size:11px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--bd);
  font-style:italic;color:var(--txt2)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.spinner{width:32px;height:32px;border:2px solid var(--bd);border-top-color:var(--violet);
  border-radius:50%;animation:spin .8s linear infinite}

.ftr{border-top:1px solid var(--bd);padding:10px 18px;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:8px;background:var(--s1);font-size:9px;color:var(--sub);
  padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.ref-btn{background:transparent;border:1px solid var(--bd);border-radius:5px;padding:4px 10px;
  color:var(--sub);font-size:9px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.ref-btn:hover{border-color:var(--violet);color:var(--violet)}

@media(max-width:680px){
  .b-kpis{grid-template-columns:repeat(2,1fr)}
  .hist-row{grid-template-columns:1fr 1fr}
  .funnel-grid{grid-template-columns:1fr}
  .pipe-grid{grid-template-columns:repeat(2,1fr)}
  .b-name{font-size:14px}
}
@media(max-width:380px){
  .b-kpis{grid-template-columns:repeat(2,1fr)}
  .bk-val{font-size:18px}
  .hist-row{grid-template-columns:1fr}
  .pipe-grid{grid-template-columns:repeat(2,1fr)}
  .main{padding:12px 14px}
}
</style>
</head>

function getFeatured(camps) {
  const live = camps.filter(c => c.isDelivering === true || (c.status==='ACTIVE' && c.today?.spend>0));
  if (live.length) return { list: live, live: true };
  const sorted = [...camps].sort((a,b)=> new Date(b.startTime) - new Date(a.startTime));
  return { list: sorted.slice(0,1), live: false };
}

        <div class="hc"><div class="hc-val" style="color:var(--violet)">${fEGP(histTotalSpend)}</div>

        <div class="hc"><div class="hc-val" style="color:${enoughHistory?cplC(histAvgCPL):'var(--sub)'}">${enoughHistory?fEGP(histAvgCPL):'—'}</div>
          <div class="hc-lbl">Avg CPL Historical</div><div class="hc-sub">${enoughHistory?'Best ever '+fEGP(Math.round(histBestCPL)):'Needs 2+ campaigns'}</div></div>

function leadCard(l) {
  const statusStyles = {
    'Qualified':{bg:'var(--gnbg)',c:'var(--green)'}, 'No Answer':{bg:'var(--ybg)',c:'var(--yellow)'},
    'Unknown':{bg:'var(--s3)',c:'var(--sub)'}, 'Not Interested':{bg:'var(--rbg)',c:'var(--red)'},
    'Reseller':{bg:'#A78BFA10',c:'#A78BFA'},
  };
  const st = statusStyles[l.stage] || {bg:'var(--s3)',c:'var(--sub)'};
  const label = l.handler ? l.stage.toUpperCase() : 'UNASSIGNED';
  return `<div class="lead-card">
    <div class="lead-top">
      <div><div class="lead-name">${l.name}</div><div class="lead-unit">${l.unit||'—'}${l.city?' · '+l.city:''}</div></div>
      <span class="lead-status" style="background:${st.bg};color:${st.c}">${label}</span>
    </div>
    <div class="lead-meta"><b>Handler:</b> ${l.handler||'—'} &nbsp;·&nbsp; <b>Received:</b> ${l.date||'—'}</div>
    ${l.feedback ? `<div class="lead-feedback">"${l.feedback}"</div>` : `<div class="lead-feedback">No feedback logged yet</div>`}
  </div>`;
}

function banner(c, histAvgCPL, histAvgCTR, histBestCPL, isLive) {
  const fc = freqC(c.freq);
  const fwBg = c.freq>=2.5?'var(--rbg)':c.freq>=2.0?'var(--ybg)':'var(--gnbg)';
  const fwTxt= c.freq>=2.5?'⚠️ Fatigue risk':c.freq>=2.0?'⚡ Watch closely':'✓ Healthy';

  // For messaging-objective campaigns (resultLabel set), the primary KPI is
  // the WhatsApp/messaging conversation count + CPMC, not form leads — form
  // leads and WhatsApp conversations are two different currencies and are
  // tracked separately (see the All Campaigns table's Leads/WhatsApp columns).
  const primaryCount = c.resultLabel ? (c.whatsappConversations||0) : c.leads;
  const primaryCost  = c.resultLabel ? (c.cpmc||0) : c.cpl;
  const primaryHasValue = c.resultLabel ? (c.whatsappConversations>0) : (c.leads>0);

  return `<div class="banner">
    <div class="b-top">
      <div class="b-name">${c.name}</div>
      <div class="b-live ${isLive?'on':'off'}"><div class="lpulse ${isLive?'on':''}"></div><span>${isLive?'Live':c.status||'Paused'}</span></div>
    </div>
    <div class="b-kpis">
      <div class="bk"><div class="bk-val" style="color:var(--coral)">${primaryCount}</div><div class="bk-lbl">${c.resultLabel || 'Total Leads'}</div></div>
      <div class="bk"><div class="bk-val" style="color:${primaryHasValue?cplC(primaryCost):'var(--sub)'}">${primaryHasValue?fEGP(primaryCost):'—'}</div><div class="bk-lbl">${c.costLabel || 'Cost Per Lead'}</div></div>
      <div class="bk"><div class="bk-val" style="color:${ctrC(c.ctr)}">${c.ctr.toFixed(2)}%</div><div class="bk-lbl">CTR</div></div>
      <div class="bk"><div class="bk-val" style="color:var(--violet)">${fEGP(c.spend)}</div><div class="bk-lbl">Total Spend</div></div>
      ${c.showWhatsappKPI ? `<div class="bk"><div class="bk-val" style="color:${(c.whatsappConversations||0)>0?'var(--green)':'var(--sub)'}">${(c.whatsappConversations||0)>0?c.whatsappConversations:'—'}</div><div class="bk-lbl">WhatsApp Conversations Started</div>${(c.whatsappConversations||0)===0?'<div class="bk-sub">Not yet tracked in export</div>':''}</div>` : ''}
    </div>
    <div class="b-foot">
      <div class="bf-item"><span class="bf-lbl">Frequency</span><span class="bf-val" style="color:${fc}">${c.freq.toFixed(2)}x</span></div>
      <span class="freq-pill" style="background:${fwBg};color:${fc};border:1px solid ${fc}28">${fwTxt}</span>
      <div class="bf-item" style="margin-left:auto"><span class="bf-lbl">CPM</span><span class="bf-val">${fEGP(c.cpm)}</span></div>
      <div class="bf-item"><span class="bf-lbl">Day</span><span class="bf-val" style="color:var(--sub)">${c.daysRunning ?? '—'}</span></div>
      <div class="bf-item"><span class="bf-lbl">Reach</span><span class="bf-val">${fK(c.reach)}</span></div>
    </div>
  </div>`;
}

function funnelCol(name, stages, total, label, accent) {
  const entries = Object.entries(stages).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const hot = (stages['Qualified']||0)+(stages['Meeting']||0)+(stages['Site Visit']||0);
  const qr = pct(hot, total);
  return `<div class="fcol">
    <div class="fcol-hd" style="color:${accent}">${label} <span class="fcol-hd-n">${total} leads</span></div>
    ${total===0
      ? `<div style="color:var(--sub);font-size:11px;text-align:center;padding:20px">No leads yet</div>`
      : entries.map(([s,n]) => {
          const c = STAGE[s]||'#3D5068'; const p = pct(n,total);
          return `<div class="fi">
            <div class="fi-dot" style="background:${c}"></div>
            <div class="fi-name">${s}</div>
            <div class="fi-bar-w"><div class="fi-bar" style="width:${p}%;background:${c}"></div></div>
            <div class="fi-n" style="color:${c}">${n}</div>
            <div class="fi-p">${p}%</div>
          </div>`;
        }).join('')
    }
    <div class="qrate"><span class="qrate-lbl">Qualify Rate</span><span class="qrate-val" style="color:${accent}">${qr}%</span></div>
  </div>`;
}

function comparison(c, histAvgCPL, histAvgCTR, histBestCPL) {
  const ov = S.hs.overall, tot = S.hs.total;
  const histQR = pct((ov['Qualified']||0)+(ov['Meeting']||0)+(ov['Site Visit']||0), tot);
  const curStages = S.hs.byCampaign?.[c.name]||{};
  const curHot = (curStages['Qualified']||0)+(curStages['Meeting']||0)+(curStages['Site Visit']||0);
  const curQR = pct(curHot, c.leads||1);
  const rows = [];

  if (c.resultLabel) {
    // Messaging-objective campaign — compare CPMC against itself only,
    // since it isn't the same currency as Lead CPL/qualify-rate.
    const msgCount = c.whatsappConversations||0;
    rows.push({ lbl:c.costLabel||'Cost', cur:msgCount>0?fEGP(c.cpmc):'—', hist:`${c.resultLabel}: ${msgCount}`,
      badge:{t:'Messaging objective',cls:'b-neu'}, color: msgCount>0?cplC(c.cpmc):'var(--sub)' });
  } else if (c.leads > 0) {
    rows.push({ lbl:'CPL', cur:fEGP(Math.round(c.cpl)), hist:`Hist avg ${fEGP(histAvgCPL)} · Best ${fEGP(Math.round(histBestCPL))}`,
      badge: c.cpl<=histBestCPL?{t:'🏆 Best ever',cls:'b-good'}:c.cpl<histAvgCPL?{t:'↓ Better than avg',cls:'b-good'}:{t:'↑ Above avg',cls:'b-bad'}, color:cplC(c.cpl) });
    rows.push({ lbl:'Qualify Rate', cur:curQR+'%', hist:`${histQR}% account average`,
      badge: curQR>histQR?{t:'↑ Better quality',cls:'b-good'}:{t:'↓ Below avg',cls:'b-warn'}, color:curQR>histQR?'var(--green)':'var(--yellow)' });
  } else {
    rows.push({ lbl:'CPL', cur:'—', hist:`Hist avg ${fEGP(histAvgCPL)} · Best ${fEGP(Math.round(histBestCPL))}`,
      badge:{t:'No leads yet',cls:'b-neu'}, color:'var(--sub)' });
  }

  rows.push({ lbl:'CTR', cur:c.ctr.toFixed(2)+'%', hist:`Hist avg ${histAvgCTR}%`,
    badge: c.ctr>parseFloat(histAvgCTR)?{t:'↑ Above avg',cls:'b-good'}:{t:'↓ Below avg',cls:'b-bad'}, color:ctrC(c.ctr) });
  rows.push({ lbl:'Frequency', cur:c.freq.toFixed(2)+'x', hist:`Concern >2.5x · Warning >2.0x`,
    badge: c.freq>=2.5?{t:'⚠️ Fatigue risk',cls:'b-bad'}:c.freq>=2.0?{t:'⚡ Watch',cls:'b-warn'}:{t:'✓ Healthy',cls:'b-good'}, color:freqC(c.freq) });

  if (c.daysRunning != null) {
    rows.push({ lbl:'Days Running', cur:c.daysRunning+'d', hist: c.dailyAvg!=null?`Daily avg spend ${fEGP(c.dailyAvg)}`:'—',
      badge: c.daysRunning<=7?{t:'🆕 New',cls:'b-neu'}:{t:'Established',cls:'b-neu'}, color:'var(--txt)' });
  }

  return rows.map(r=>`<div class="cmp-row">
    <span class="cmp-lbl">${r.lbl}</span><span class="cmp-cur" style="color:${r.color}">${r.cur}</span>
    <span class="cmp-hist">${r.hist}</span><span class="badge ${r.badge.cls}">${r.badge.t}</span>
  </div>`).join('');
}

function tick() {
  const t = new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clk').textContent = t;
  const f = document.getElementById('ftr-clk');
  if (f) f.textContent = t;
}

render();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
